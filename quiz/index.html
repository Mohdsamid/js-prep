<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZ GAME</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
        <div class="game">
      <h2 class="h">🧠 Quiz Time!</h2>
      <div class="score">
        <p>Score: <span>0</span> </p>
        <div class="time2">⏱️ <span id="time">0</span>s</div>
      </div>
      <div class="heading">
        <p id="qh">Question 1 of 5</p>
        <h2 id="ques"></h2>
      </div>
      <div class="options">
        <button class="ans">Hyper Text Markup Language</button>
        <button class="ans">High Text Markup Language</button>
        <button class="ans">Hyper Tabular Markup Language</button>
        <button class="ans">Home Tool Markup Language</button>
      </div>
      <button id="submit">Next Question</button>
    </div>
    </div>
    <script src="brain.js"></script>
  </body>
</html>
